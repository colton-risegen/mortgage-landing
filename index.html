<!DOCTYPE html>
<html>
<head>
  <title>Protect Your Mortgage</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body { font-family: Arial; text-align: center; background:#f9fafb; padding:20px; }
    .box { max-width:400px; margin:auto; background:white; padding:20px; border-radius:10px; }
    input { width:100%; padding:10px; margin:8px 0; }
    button { width:100%; padding:12px; background:#2563eb; color:white; border:none; }
  </style>
</head>

  
<body>

<div class="box">
  <h2>Protect Your Mortgage. Protect Your Family.</h2>
  <p>Get a free quote in minutes.</p>

  <form>
    <input placeholder="First Name" required>
    <input placeholder="Last Name" required>
    <input placeholder="Phone" required>
    <input placeholder="Email" required>
    <input placeholder="ZIP Code" required>

    <button type="submit">Get My Quote</button>
<form id="leadForm">
</div>

<script>
window.addEventListener('load', function () {
  const form = document.getElementById('leadForm');

  form.addEventListener('submit', async function (e) {
    e.preventDefault();

    const data = {
      first_name: form.querySelector('[name="first_name"]').value,
      last_name: form.querySelector('[name="last_name"]').value,
      phone: form.querySelector('[name="phone"]').value,
      email: form.querySelector('[name="email"]').value,
      zip: form.querySelector('[name="zip"]').value
    };

    console.log("SENDING:", data);

    await fetch('/api/lead', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

    alert("Lead submitted");
  });
});
</script>
  
</body>
</html>
