<!DOCTYPE html>
<html>
<head>
  <title>Protect Your Mortgage</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body { font-family: Arial; text-align: center; background:#f9fafb; padding:20px; }
    .box { max-width:400px; margin:auto; background:white; padding:20px; border-radius:10px; }
    input { width:100%; padding:10px; margin:8px 0; }
    button { width:100%; padding:12px; background:#2563eb; color:white; border:none; }
  </style>
</head>

<body>

<div class="box">
  <h2>Protect Your Mortgage. Protect Your Family.</h2>
  <p>Get a free quote in minutes.</p>

  <form id="leadForm">
    <input name="first_name" placeholder="First Name" required>
    <input name="last_name" placeholder="Last Name" required>
    <input name="phone" placeholder="Phone" required pattern="[0-9]{10}" title="Enter 10 digit phone number">
    <input name="email" placeholder="Email" required type="email">
    <input name="zip" placeholder="ZIP Code" required pattern="[0-9]{5}" title="Enter 5 digit ZIP code">
    <input type="hidden" name="trusted_form" id="trusted_form">
    <input type="hidden" name="leadid_token" id="leadid_token">
    <input type="hidden" name="tcpa_text" id="tcpa_text">

    <div style="text-align:left; margin-top:10px;">
  <label style="font-size:12px; line-height:1.4;">
    <input type="checkbox" id="tcpa_consent" required style="margin-right:6px;">
    By clicking “Get My Quote”, I provide my electronic signature and consent to be contacted by 
    <strong>licensed insurance agents</strong> regarding mortgage protection at the phone number 
    provided, including via automated dialing systems, prerecorded calls, and SMS/MMS, even if I am on a Do Not Call list. 
    Consent is not required to purchase.
  </label>
</div>
    <button type="submit">Get My Quote</button>
  </form>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const form = document.getElementById('leadForm');

  if (!form) {
    console.error("FORM NOT FOUND");
    return;
  }

  form.addEventListener('submit', async function (e) {
    e.preventDefault();

    const data = {
  first_name: form.first_name.value,
  last_name: form.last_name.value,
  phone: form.phone.value,
  email: form.email.value,
  zip: form.zip.value,
  trusted_form: document.getElementById('trusted_form').value,
  jornaya_id: document.getElementById('leadid_token').value,
  tcpa_text: document.getElementById('tcpa_consent').checked
    ? "User agreed to TCPA consent on form submission"
    : "NOT CONSENTED"
};

    console.log("SENDING:", data);

    try {
      const res = await fetch('/api/lead', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      console.log("RESPONSE:", await res.text());
      alert("Lead submitted");
    } catch (err) {
      console.error("ERROR:", err);
    }
  });
});
</script>

  var tf = document.createElement('script');

  var s = document.getElementsByTagName('script')[0];
  s.parentNode.insertBefore(tf, s);
})();
</script>
