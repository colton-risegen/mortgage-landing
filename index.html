<!DOCTYPE html>
<html>
<head>
  <title>Protect Your Mortgage</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6f9;
      color: #333;
    }

    .hero {
      background: url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover no-repeat;
      color: white;
      padding: 60px 20px;
      text-align: center;
    }

    .hero h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 16px;
      opacity: 0.9;
    }

    .container {
      max-width: 420px;
      margin: -40px auto 20px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .benefits {
      max-width: 420px;
      margin: 20px auto;
      font-size: 14px;
    }

    .benefits div {
      margin-bottom: 8px;
    }

    .consent {
      font-size: 11px;
      text-align: left;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="hero">
  <h1>Protect Your Home. Protect Your Family.</h1>
  <p>Affordable mortgage protection coverage in minutes</p>
</div>

<div class="container">
  <form id="leadForm">

    <input type="hidden" name="xxTrustedFormCertUrl" id="xxTrustedFormCertUrl">
    <input type="hidden" name="universal_leadid" id="universal_leadid">
    <input type="hidden" name="tcpa_text" id="tcpa_text">

    <input name="first_name" placeholder="First Name" required>
    <input name="last_name" placeholder="Last Name" required>
    <input name="phone" placeholder="Phone" required pattern="[0-9]{10}">
    <input name="email" placeholder="Email" required type="email">
    <input name="zip" placeholder="ZIP Code" required pattern="[0-9]{5}">
    <input name="address" placeholder="Street Address" required>
    <input name="city" placeholder="City" required>
    <input name="state" placeholder="State" required maxlength="2">

    <div style="text-align:left; margin-top:10px;">
    <label class="consent">
    <input type="checkbox" id="tcpa_consent" required>
  By clicking “Get My Quote”, you agree to be contacted by licensed agents via call, text, or email regarding mortgage protection products at the number and email you provided, including via automated technology. Consent is not required to purchase.
</label>
    </div>

    <button type="submit">Get My Free Quote</button>
  </form>
</div>

<div class="benefits">
  <div>✔ Protect your family from mortgage burden</div>
  <div>✔ Fast approvals with no medical exams (in many cases)</div>
  <div>✔ Affordable monthly plans</div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const form = document.getElementById('leadForm');

  form.addEventListener('submit', async function (e) {
    e.preventDefault();

   const data = {
  first_name: form.first_name.value,
  last_name: form.last_name.value,
  phone: form.phone.value.replace(/\D/g, ''),
  email: form.email.value,

  address: form.address.value,
  city: form.city.value,
  state: form.state.value.toUpperCase(),
  zip: form.zip.value,

  trusted_form_cert_url: document.getElementById('xxTrustedFormCertUrl').value,
  universal_leadid: document.getElementById('universal_leadid').value,

  tcpa_text: document.querySelector('.consent').innerText
};

    console.log("SENDING:", data);

    await fetch('/api/lead', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

    alert("Thanks! A licensed agent will contact you shortly.");
  });
});
</script>
<!-- TrustedForm -->

var tf = document.createElement('script');
tf.type = 'text/javascript';
tf.async = true;
tf.src = ("https:" == document.location.protocol ? 'https' : 'http') +

new Date().getTime() + Math.random();
var s = document.getElementsByTagName('script')[0]; s.parentNode.insertBefore(tf, s);
})();
</script>

</body>
</html>
